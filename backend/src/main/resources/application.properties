spring.application.name=biotech-tracker

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bdit}
spring.datasource.username=${DB_USERNAME:bdit}
spring.datasource.password=${DB_PASSWORD:bdit}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Scheduling
spring.task.scheduling.pool.size=5

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:4173}

# Ingestion
app.ingestion.enabled=${INGESTION_ENABLED:true}
app.ingestion.cron=${INGESTION_CRON:0 0 */8 * * *}

server.port=${PORT:8080}
server.max-http-request-header-size=64KB
