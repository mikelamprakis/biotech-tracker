services:
  - type: web
    name: biotech-tracker-backend
    runtime: java
    rootDir: backend
    buildCommand: ./mvnw -q package -DskipTests
    startCommand: java -Xmx256m -jar target/biotech-tracker.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: INGESTION_ENABLED
        value: "true"
