services:
  - type: web
    name: biotech-tracker-backend
    runtime: image
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: INGESTION_ENABLED
        value: "true"
